<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Local Fold — Privacy &amp; Legal</title>
  <meta name="description" content="Privacy policy and legal documents for the Local Fold iOS app.">
  <style>
    :root {
      --bg: #FAF7F1;
      --ink: #14170F;
      --ink-muted: #5A5E51;
      --rule: rgba(20, 23, 15, 0.08);
      --accent: #2E5326;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
            "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      max-width: 460px;
      width: 100%;
      text-align: center;
    }
    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin: 0 0 8px;
    }
    h1 {
      font-size: 36px;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin: 0 0 12px;
    }
    h1 em {
      font-style: italic;
      color: var(--ink-muted);
      font-weight: normal;
    }
    p {
      color: var(--ink-muted);
      margin: 0 0 32px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 16px;
    }
    a.card {
      display: block;
      padding: 18px 20px;
      border: 1px solid var(--rule);
      border-radius: 12px;
      text-decoration: none;
      color: var(--ink);
      background: #fff;
      transition: border-color 0.15s, transform 0.15s;
    }
    a.card:hover {
      border-color: var(--accent);
    }
    a.card .label {
      font-weight: 600;
      letter-spacing: -0.005em;
    }
    a.card .sub {
      font-size: 13px;
      color: var(--ink-muted);
      margin-top: 2px;
    }
    .footer {
      margin-top: 48px;
      font-size: 13px;
      color: var(--ink-muted);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #14170F;
        --ink: #F0EDE5;
        --ink-muted: #98998D;
        --rule: rgba(240, 237, 229, 0.1);
        --accent: #8FB87A;
      }
      a.card { background: #1C1F18; }
    }
  </style>
</head>
<body>
<main>
  <p class="eyebrow">Local Fold</p>
  <h1>The leather scorepad <em>for your Tuesday game.</em></h1>
  <p>Legal documents for the Local Fold iOS app.</p>
  <div class="links">
    <a class="card" href="privacy.html">
      <div class="label">Privacy Policy</div>
      <div class="sub">What we collect, why, and your rights. (English)</div>
    </a>
    <a class="card" href="privacy_pl.html">
      <div class="label">Polityka prywatności</div>
      <div class="sub">Jakie dane zbieramy, w jakim celu i Twoje prawa. (polski)</div>
    </a>
  </div>
  <p class="footer">© 2026 Wiktor Zając</p>
</main>
</body>
</html>
